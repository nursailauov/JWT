<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT MAKER • M222HP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #050508;
            --card-bg: rgba(15, 15, 25, 0.85);
            --text-main: #e0e0ff;
            --text-dim: #9494b8;
            --success: #00ff88;
            --error: #ff3366;
            --accent: #ff00ff;
            --google: #4285F4;
            --facebook: #1877F2;
            --vk: #4C75A3;
            --huawei: #CF0A2C;
            --garena: #FF0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05),
                rgba(0, 0, 0, 0.05) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .logo h1:hover {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 0 0 0 transparent; }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 var(--accent), -2px 0 var(--primary); }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 var(--accent), -2px 0 var(--primary); }
            60% { transform: translate(2px, 2px); text-shadow: -2px 0 var(--accent), 2px 0 var(--primary); }
            80% { transform: translate(2px, -2px); text-shadow: -2px 0 var(--accent), 2px 0 var(--primary); }
            100% { transform: translate(0); }
        }

        .logo p {
            color: var(--text-dim);
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 12px;
            color: var(--text-dim);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-tab.active, .nav-tab:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.1);
            border-color: rgba(0, 242, 255, 0.2);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .card h2 i {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 14px 16px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 10px;
            padding: 16px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(112, 0, 255, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .result-container {
            margin-top: 50px;
            display: none;
            animation: fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: linear-gradient(135deg, rgba(25, 25, 45, 0.95), rgba(15, 15, 25, 0.95));
            border: 2px solid var(--primary);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 35px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 25px;
        }

        .avatar-wrap {
            position: relative;
        }

        .avatar-placeholder {
            width: 90px;
            height: 90px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            font-family: 'Orbitron', sans-serif;
        }

        .platform-icon-overlay {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 32px;
            height: 32px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .user-info h3 {
            font-size: 2.2rem;
            color: white;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .user-info p {
            color: var(--primary);
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .data-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .data-value {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .token-area {
            margin-top: 30px;
        }

        .token-box {
            background: #000;
            padding: 25px;
            border-radius: 15px;
            font-family: 'Courier New', Courier, monospace;
            word-break: break-all;
            font-size: 0.9rem;
            color: var(--success);
            border: 1px solid rgba(0, 255, 136, 0.2);
            max-height: 200px;
            overflow-y: auto;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .token-box:hover {
            border-color: var(--success);
            box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .token-box::after {
            content: 'CLICK TO COPY';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 255, 136, 0.9);
            color: black;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .token-box:hover::after {
            opacity: 1;
        }

        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn-download {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-download:hover {
            background: var(--primary);
            color: black;
        }

        .status-msg {
            text-align: center;
            margin-top: 20px;
            font-weight: 700;
            min-height: 24px;
            font-size: 1.1rem;
        }

        .status-msg.error { color: var(--error); }
        .status-msg.success { color: var(--success); }

        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding-bottom: 40px;
        }

        /* Platform specific colors/icons */
        .icon-google { color: var(--google); }
        .icon-facebook { color: var(--facebook); }
        .icon-vk { color: var(--vk); }
        .icon-huawei { color: var(--huawei); }
        .icon-garena { color: var(--garena); }

        @media (max-width: 768px) {
            .logo h1 { font-size: 2.2rem; }
            .nav-tabs { flex-wrap: wrap; }
            .result-header { flex-direction: column; text-align: center; }
            .action-btns { flex-direction: column; }
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 50px;
            height: 50px;
            margin: 30px auto;
            border: 4px solid rgba(255,255,255,.05);
            border-radius: 50%;
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: black;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">COPIED TO CLIPPBOARD</div>

    <div class="container">
        <header>
            <div class="logo">
                <h1>JWT MAKER</h1>
                <p>Advanced Garena Authentication System</p>
            </div>
        </header>

        <nav class="nav-tabs">
            <a href="/" class="nav-tab active"><i class="fa-solid fa-house"></i> Home</a>
            <a href="/bulk" class="nav-tab"><i class="fa-solid fa-layer-group"></i> Bulk</a>
            <a href="https://t.me/nur_sailauov" target="_blank" class="nav-tab"><i class="fa-brands fa-telegram"></i> Telegram</a>
        </nav>

        <div class="main-grid">
            <div class="card">
                <h2><i class="fa-solid fa-key"></i> ACCESS TOKEN</h2>
                <form id="accessForm">
                    <div class="form-group">
                        <label for="accessToken">Access Token / URL</label>
                        <textarea id="accessToken" placeholder="Enter Access Token or EAT Link" required></textarea>
                    </div>
                    <button type="submit" class="btn" id="accessBtn">
                        <i class="fa-solid fa-right-to-bracket"></i> AUTH BY TOKEN
                    </button>
                </form>
            </div>

            <div class="card">
                <h2><i class="fa-solid fa-user-secret"></i> GUEST LOGIN</h2>
                <form id="guestForm">
                    <div class="form-group">
                        <label for="guestUid">Guest UID</label>
                        <input type="text" id="guestUid" placeholder="Enter UID" required>
                    </div>
                    <div class="form-group">
                        <label for="guestPassword">Guest Password</label>
                        <input type="password" id="guestPassword" placeholder="Enter Password" required>
                    </div>
                    <button type="submit" class="btn" id="guestBtn">
                        <i class="fa-solid fa-ghost"></i> GENERATE GUEST
                    </button>
                </form>
            </div>
        </div>

        <div class="spinner" id="loader"></div>
        <div id="status" class="status-msg"></div>

        <div class="result-container" id="resultArea">
            <div class="result-card">
                <div class="result-header">
                    <div class="avatar-wrap">
                        <div class="avatar-placeholder" id="avatarChar">?</div>
                        <div class="platform-icon-overlay" id="platformIconOverlay">
                            <i class="fa-solid fa-question"></i>
                        </div>
                    </div>
                    <div class="user-info">
                        <h3 id="resName">N/A</h3>
                        <p id="resId">ID: 000000000</p>
                    </div>
                </div>

                <div class="data-grid">
                    <div class="data-item">
                        <div class="data-label">Region</div>
                        <div class="data-value" id="resRegion"><i class="fa-solid fa-earth-americas" style="color:var(--primary)"></i> -</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Level</div>
                        <div class="data-value" id="resLevel"><i class="fa-solid fa-star" style="color:#ffbb42"></i> -</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Likes</div>
                        <div class="data-value" id="resLikes"><i class="fa-solid fa-heart" style="color:#ff59ae"></i> -</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Platform</div>
                        <div class="data-value" id="resPlatform">-</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Status</div>
                        <div class="data-value" style="color: var(--success);"><i class="fa-solid fa-circle-check"></i> ACTIVE</div>
                    </div>
                </div>

                <div class="token-area">
                    <div class="token-box" id="resToken">
                        ...
                    </div>
                </div>
                
                <div class="action-btns">
                    <button class="action-btn btn-download" id="downloadJsonBtn">
                        <i class="fa-solid fa-file-code"></i> DOWNLOAD JSON
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 M222HP PREMIUM • POWERED BY GARENA API</p>
        </footer>
    </div>

    <script>
        const accessForm = document.getElementById('accessForm');
        const guestForm = document.getElementById('guestForm');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        const toast = document.getElementById('toast');
        const downloadJsonBtn = document.getElementById('downloadJsonBtn');
        let currentData = null;

        async function handleRequest(url, method = 'GET', body = null) {
            loader.style.display = 'block';
            status.textContent = 'SYSTEM: ACCESSING GARENA MAINFRAME...';
            status.className = 'status-msg';
            resultArea.style.display = 'none';

            try {
                const options = { method };
                if (body) {
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(url, options);
                const data = await response.json();

                loader.style.display = 'none';

                if (response.ok && (data.status === 'success' || data.token)) {
                    currentData = data;
                    showResult(data);
                    status.textContent = 'SYSTEM: AUTHENTICATION GRANTED';
                    status.className = 'status-msg success';
                } else {
                    status.textContent = 'ERROR: ' + (data.message || 'Access Denied');
                    status.className = 'status-msg error';
                }
            } catch (err) {
                loader.style.display = 'none';
                status.textContent = 'ERROR: CONNECTION TIMEOUT';
                status.className = 'status-msg error';
            }
        }

        function showResult(data) {
            document.getElementById('resName').textContent = data.account_name || 'UNKNOWN';
            document.getElementById('resId').textContent = 'ID: ' + (data.account_id || data.uid || '-');
            document.getElementById('resRegion').innerHTML = `<i class="fa-solid fa-earth-americas" style="color:var(--primary)"></i> ${data.region || '-'}`;
            document.getElementById('resLevel').innerHTML = `<i class="fa-solid fa-star" style="color:#ffbb42"></i> ${data.level ?? '-'}`;
            document.getElementById('resLikes').innerHTML = `<i class="fa-solid fa-heart" style="color:#ff59ae"></i> ${data.likes ?? '-'}`;
            
            const platformInfo = getPlatformInfo(data.platform_type || data.platform);
            document.getElementById('resPlatform').innerHTML = `<i class="${platformInfo.icon} ${platformInfo.class}"></i> ${platformInfo.name}`;
            document.getElementById('platformIconOverlay').innerHTML = `<i class="${platformInfo.icon} ${platformInfo.class}"></i>`;
            document.getElementById('platformIconOverlay').style.color = 'inherit';
            
            document.getElementById('resToken').textContent = data.token || data.jwt || '-';
            document.getElementById('avatarChar').textContent = (data.account_name || '?')[0].toUpperCase();
            
            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        function getPlatformInfo(type) {
            const sType = String(type);
            switch(sType) {
                case '8': return { name: 'GOOGLE', icon: 'fa-brands fa-google', class: 'icon-google' };
                case '3': return { name: 'FACEBOOK', icon: 'fa-brands fa-facebook', class: 'icon-facebook' };
                case '4': return { name: 'GUEST', icon: 'fa-solid fa-user-secret', class: '' };
                case '5': return { name: 'VK', icon: 'fa-brands fa-vk', class: 'icon-vk' };
                case '6': return { name: 'HUAWEI', icon: 'fa-solid fa-h', class: 'icon-huawei' };
                case '11': return { name: 'X', icon: 'fa-brands fa-x-twitter', class: '' };
                case '13': return { name: 'APPLE', icon: 'fa-brands fa-apple', class: '' };
                case '1': return { name: 'GARENA', icon: 'fa-solid fa-g', class: 'icon-garena' };
                default: return { name: type || 'Unknown', icon: 'fa-solid fa-user', class: '' };
            }
        }

        accessForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('accessToken').value.trim();
            
            if (input.includes('http') || input.includes('eat=')) {
                let url = `/eat?eat_token=${encodeURIComponent(input)}`;
                handleRequest(url);
            } else {
                let url = `/token?access_token=${encodeURIComponent(input)}`;
                handleRequest(url);
            }
        });

        guestForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const uid = document.getElementById('guestUid').value;
            const password = document.getElementById('guestPassword').value;
            handleRequest(`/guest?uid=${uid}&password=${encodeURIComponent(password)}`);
        });

        const resToken = document.getElementById('resToken');
        resToken.addEventListener('click', () => {
            const token = resToken.textContent;
            navigator.clipboard.writeText(token).then(() => {
                showToast();
            });
        });

        function showToast() {
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        downloadJsonBtn.addEventListener('click', () => {
            if (!currentData) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentData, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", `jwt_${currentData.account_id || 'export'}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });
    </script>

    <div class="music-container">
        <div class="music-info">
            <div class="track-name" id="trackName">CYBERPUNK BEATS</div>
            <div class="progress-bar-wrap" id="musicProgress">
                <div class="progress-bar-fill" id="musicFill"></div>
            </div>
        </div>
        <div class="music-controls">
            <button class="music-btn" id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
            <button class="music-btn play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
            <button class="music-btn" id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
            <div class="volume-wrap">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>
        <audio id="bgAudio" loop></audio>
    </div>

    <style>
    .music-container {
        position: fixed; bottom: 30px; right: 30px; background: rgba(15, 15, 25, 0.9);
        border: 1px solid var(--primary); border-radius: 15px; padding: 15px 25px;
        z-index: 999; display: flex; align-items: center; gap: 25px; backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); transition: all 0.3s;
    }
    .music-info { display: flex; flex-direction: column; gap: 8px; min-width: 150px; }
    .track-name { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; }
    .progress-bar-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: width 0.1s; }
    .music-controls { display: flex; align-items: center; gap: 15px; }
    .music-btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
    .music-btn:hover { color: var(--primary); transform: scale(1.1); }
    .play-btn { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; color: black; display: grid; place-items: center; font-size: 1.2rem; }
    .play-btn:hover { background: white; box-shadow: 0 0 15px white; }
    .volume-wrap { display: flex; align-items: center; gap: 10px; color: var(--text-dim); }
    .volume-slider { width: 80px; accent-color: var(--primary); cursor: pointer; }

    @media (max-width: 600px) { .music-container { right: 10px; left: 10px; bottom: 10px; padding: 10px; gap: 10px; } .music-info { display: none; } }
    </style>

    <script>
    const audio = document.getElementById('bgAudio');
    const pBtn = document.getElementById('playBtn');
    const vol = document.getElementById('volumeSlider');
    const fill = document.getElementById('musicFill');
    const trackNameElement = document.getElementById('trackName');

    const tracks = [
        { name: "NEON NIGHTS", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { name: "CYBER ATTACK", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { name: "RETROWAVE", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];
    let currentTrack = 0;

    function loadTrack(i) {
        audio.src = tracks[i].url;
        trackNameElement.textContent = tracks[i].name;
    }

    loadTrack(0); audio.volume = 0.5;

    pBtn.onclick = () => {
        if(audio.paused) { audio.play(); pBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; }
        else { audio.pause(); pBtn.innerHTML = '<i class="fa-solid fa-play"></i>'; }
    };

    document.getElementById('nextBtn').onclick = () => { currentTrack = (currentTrack + 1) % tracks.length; loadTrack(currentTrack); audio.play(); pBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; };
    document.getElementById('prevBtn').onclick = () => { currentTrack = (currentTrack - 1 + tracks.length) % tracks.length; loadTrack(currentTrack); audio.play(); pBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; };

    vol.oninput = (e) => { audio.volume = e.target.value; };
    audio.ontimeupdate = () => { fill.style.width = (audio.currentTime / audio.duration * 100) + '%'; };
    </script>
</body>
</html>
